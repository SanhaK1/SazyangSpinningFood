<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>saaaazyaaaang</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: url('images/background.webp') no-repeat center center/cover;
      overflow: hidden;
    }

    .slider {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      perspective: 1000px;
    }

    .carousel {
      width: 100%;
      height: 100%;
      position: absolute;
      transform-style: preserve-3d;
      animation: rotate 20s infinite linear;
    }

    .carousel img {
      position: absolute;
      width: 250px;
      height: 250px;
      left: 75px;
      top: 75px;
      border-radius: 10px;
    }

    /* 5개 이미지 배치 (원형) */
    .carousel img:nth-child(1) { transform: rotateY(0deg) translateZ(300px); }
    .carousel img:nth-child(2) { transform: rotateY(72deg) translateZ(300px); }
    .carousel img:nth-child(3) { transform: rotateY(144deg) translateZ(300px); }
    .carousel img:nth-child(4) { transform: rotateY(216deg) translateZ(300px); }
    .carousel img:nth-child(5) { transform: rotateY(288deg) translateZ(300px); }

    @keyframes rotate {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
  </style>
</head>

<body>

<div class="slider">
  <div class="carousel">
    <img src="images/Bagel.png">
    <img src="images/Baguette.png">
    <img src="images/campagne.png">
    <img src="images/Croissant.png">
    <img src="images/White Bread.png">
  </div>
</div>

</body>
</html>
